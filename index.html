      function renderSwapPanel(swapPanel, currentRecipe, dayIndex, slot, expandPanel) {
        swapPanel.innerHTML = '';

        var swapResult = matchRecipes(
          (plan.constraints && plan.constraints.pantry) ? plan.constraints.pantry : [],
          constraints,
          { mealType: slot, avoidFoods: constraints.avoidFoods || [] }
        );

        var swapCandidates = [];
        (swapResult.tier1 || []).forEach(function (x) { swapCandidates.push(x.recipe || x); });
        (swapResult.tier2 || []).forEach(function (x) { swapCandidates.push(x.recipe || x); });

        var alts = swapCandidates.filter(function (r) {
          return r.id !== currentRecipe.id;
        }).slice(0, 3);

        if (alts.length === 0) {
          var none = document.createElement('p');
          none.style.cssText = 'font-size: 13px; color: var(--txt2); padding: 8px 0;';
          none.textContent = 'No alternatives found with your current ingredients.';
          swapPanel.appendChild(none);
        } else {
          alts.forEach(function (alt) {
            var altRow = document.createElement('div');
            altRow.style.cssText = [
              'display: flex',
              'align-items: center',
              'gap: 10px',
              'padding: 10px 0',
              'border-bottom: 1px solid var(--brd)',
              'cursor: pointer'
            ].join(';');

            var altEmoji = document.createElement('span');
            altEmoji.style.cssText = 'font-size: 20px; flex-shrink: 0;';
            altEmoji.textContent = alt.e || '\uD83C\uDF72';

            var altInfo = document.createElement('div');
            altInfo.style.cssText = 'flex: 1;';

            var altName = document.createElement('p');
            altName.style.cssText = 'font-size: 13px; font-weight: 600; color: var(--txt); margin: 0;';
            altName.textContent = alt.name;

            var altMeta = document.createElement('p');
            altMeta.style.cssText = 'font-size: 11px; color: var(--txt2); margin: 2px 0 0;';
            altMeta.textContent = (alt.time || '') + (alt.diff ? '  \u00B7  ' + alt.diff : '');

            altInfo.appendChild(altName);
            altInfo.appendChild(altMeta);
            altRow.appendChild(altEmoji);
            altRow.appendChild(altInfo);

            altRow.addEventListener('click', function () {
              plan.calendar[dayIndex][slot] = alt;
              plan.groceryList = buildGroceryList(plan.calendar, [], servings);
              savePlan(plan);
              showToast(alt.name + ' added to your plan.');
              renderTabContent();
            });

            swapPanel.appendChild(altRow);
          });
        }

        var keepLink = document.createElement('p');
        keepLink.style.cssText = 'font-size: 12px; color: var(--forest); font-weight: 600; cursor: pointer; margin-top: 10px; text-align: center;';
        keepLink.textContent = 'Keep original';
        keepLink.addEventListener('click', function () {
          swapPanel.style.display = 'none';
        });
        swapPanel.appendChild(keepLink);
      }

      /* ---- RENDER GROCERY TAB ---- */
      function renderGrocery() {
        tabContent.innerHTML = '';

        var gl = plan.groceryList || { items: [], total: 0 };
        var items = gl.items || [];

        /* Track which item's meal list is currently expanded */
        var openMealIdx = -1;

        /* ---- TOTAL ESTIMATE CARD ---- */
        var totalCard = document.createElement('div');
        totalCard.className = 'card-success';
        totalCard.style.cssText = 'margin: 16px 16px 0;';

        function recalcTotal() {
          var currentItems = plan.groceryList ? (plan.groceryList.items || []) : [];
          var sum = 0;
          var pricedCount = 0;
          currentItems.forEach(function (it) {
            if (it.price) { sum += it.price; pricedCount++; }
          });
          return { sum: sum, pricedCount: pricedCount, total: currentItems.length };
        }

        var totalAmt = document.createElement('p');
        totalAmt.id = 'grocery-total-amt';
        totalAmt.style.cssText = 'font-size: 16px; font-weight: 700; color: var(--forest); margin-bottom: 4px;';

        var totalBreakdown = document.createElement('p');
        totalBreakdown.id = 'grocery-total-breakdown';
        totalBreakdown.style.cssText = 'font-size: 12px; color: var(--txt2); margin-bottom: 2px;';

        function updateTotalDisplay() {
          var t = recalcTotal();
          totalAmt.textContent = 'Estimated total: \u20A6' + t.sum.toLocaleString();
          if (t.total === 0) {
            totalBreakdown.textContent = '';
          } else if (t.pricedCount === t.total) {
            totalBreakdown.textContent = 'Based on ' + t.total + (t.total === 1 ? ' item.' : ' items.');
          } else {
            totalBreakdown.textContent = 'Based on ' + t.pricedCount + ' of ' + t.total + ' items. Some prices not available.';
          }
        }

        updateTotalDisplay();

        var totalNote = document.createElement('p');
        totalNote.style.cssText = 'font-size: 12px; color: var(--txt2);';
        totalNote.textContent = PRICE_NOTE;

        totalCard.appendChild(totalAmt);
        totalCard.appendChild(totalBreakdown);
        totalCard.appendChild(totalNote);

        if (servings !== 'Just me') {
          var servNote = document.createElement('p');
          servNote.style.cssText = 'font-size: 12px; color: var(--txt2); margin-top: 4px;';
          servNote.textContent = 'Quantities adjusted for ' + servings + ' people.';
          totalCard.appendChild(servNote);
        }

        tabContent.appendChild(totalCard);

        /* ---- LIST AREA (rendered fresh each time, so we can re-render on remove) ---- */
        var listArea = document.createElement('div');
        tabContent.appendChild(listArea);

        function renderListArea() {
          listArea.innerHTML = '';
          openMealIdx = -1;

          var currentItems = plan.groceryList ? (plan.groceryList.items || []) : [];

          if (currentItems.length === 0) {
            /* Empty state */
            var emptyCard = document.createElement('div');
            emptyCard.className = 'card-success';
            emptyCard.style.cssText = 'margin: 12px 16px; text-align: center;';

            var emptyMsg = document.createElement('p');
            emptyMsg.style.cssText = 'font-size: 14px; color: var(--txt); margin: 0 0 12px;';
            emptyMsg.textContent = 'Your list is empty. Either you have everything you need or you have removed all items.';

            var rebuildBtn = document.createElement('button');
            rebuildBtn.className = 'btn btn-secondary';
            rebuildBtn.style.cssText = 'font-size: 13px; padding: 10px 16px;';
            rebuildBtn.textContent = 'Rebuild grocery list';
            rebuildBtn.addEventListener('click', function () {
              var originalPantry = (plan.constraints && plan.constraints.pantry) ? plan.constraints.pantry : [];
              plan.groceryList = buildGroceryList(plan.calendar, originalPantry, servings);
              savePlan(plan);
              updateTotalDisplay();
              renderListArea();
            });

            emptyCard.appendChild(emptyMsg);
            emptyCard.appendChild(rebuildBtn);
            listArea.appendChild(emptyCard);
            return;
          }

          /* Section label */
          var sectionLabel = document.createElement('p');
          sectionLabel.style.cssText = 'font-size: 13px; font-weight: 600; color: var(--txt); margin: 16px 16px 8px;';
          sectionLabel.textContent = 'What you need to buy';
          listArea.appendChild(sectionLabel);

          var listCard = document.createElement('div');
          listCard.className = 'card';
          listCard.style.cssText = 'margin: 0 16px; padding: 0;';

          currentItems.forEach(function (item, idx) {
            /* Parse meals from purpose string */
            var meals = item.purpose ? item.purpose.split(',').map(function (m) { return m.trim(); }).filter(Boolean) : [];
            var mealCount = meals.length;
            var mealLabel = mealCount === 1 ? 'Used in 1 meal' : 'Used in ' + mealCount + ' meals';

            /* Row wrapper */
            var itemRow = document.createElement('div');
            itemRow.style.cssText = [
              'display: flex',
              'align-items: flex-start',
              'gap: 12px',
              'padding: 14px 14px',
              idx < currentItems.length - 1 ? 'border-bottom: 1px solid var(--brd)' : ''
            ].join(';');

            /* LEFT SIDE */
            var itemLeft = document.createElement('div');
            itemLeft.style.cssText = 'flex: 1; min-width: 0;';

            var itemName = document.createElement('p');
            itemName.style.cssText = 'font-size: 14px; font-weight: 600; color: var(--txt); margin: 0 0 2px;';
            itemName.textContent = item.item;

            var itemQty = document.createElement('p');
            itemQty.style.cssText = 'font-size: 12px; color: var(--txt2); margin: 0 0 4px;';
            itemQty.textContent = item.qty || 'as needed';

            /* Collapsible meal link */
            var mealToggle = document.createElement('button');
            mealToggle.style.cssText = [
              'background: none',
              'border: none',
              'padding: 0',
              'font-family: var(--font)',
              'font-size: 12px',
              'font-weight: 600',
              'color: var(--leaf)',
              'cursor: pointer',
              'text-align: left',
              'display: block',
              'margin: 0'
            ].join(';');
            mealToggle.textContent = mealLabel;

            /* Expanded meal bullet list */
            var mealList = document.createElement('div');
            mealList.style.cssText = 'display: none; margin-top: 6px;';
            meals.forEach(function (mealName) {
              var mealRow = document.createElement('div');
              mealRow.style.cssText = 'display: flex; align-items: center; gap: 6px; margin-bottom: 3px;';
              var dot = document.createElement('span');
              dot.style.cssText = 'width: 5px; height: 5px; border-radius: 50%; background: var(--leaf); flex-shrink: 0; display: inline-block;';
              var mealNameEl = document.createElement('span');
              mealNameEl.style.cssText = 'font-size: 13px; color: var(--txt2);';
              mealNameEl.textContent = mealName;
              mealRow.appendChild(dot);
              mealRow.appendChild(mealNameEl);
              mealList.appendChild(mealRow);
            });

            mealToggle.addEventListener('click', function () {
              var isOpen = mealList.style.display !== 'none';
              /* Collapse all open meal lists in the card */
              listCard.querySelectorAll('[data-meal-list]').forEach(function (el) {
                el.style.display = 'none';
              });
              if (!isOpen) {
                mealList.style.display = 'block';
              }
            });

            mealList.setAttribute('data-meal-list', '1');

            itemLeft.appendChild(itemName);
            itemLeft.appendChild(itemQty);
            itemLeft.appendChild(mealToggle);
            itemLeft.appendChild(mealList);

            /* RIGHT SIDE */
            var itemRight = document.createElement('div');
            itemRight.style.cssText = 'display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0;';

            var itemPrice = document.createElement('p');
            itemPrice.style.cssText = item.price
              ? 'font-size: 14px; font-weight: 700; color: var(--forest); margin: 0; white-space: nowrap;'
              : 'font-size: 12px; color: var(--txt2); font-style: italic; margin: 0; white-space: nowrap;';
            itemPrice.textContent = item.price
              ? '\u20A6' + item.price.toLocaleString()
              : 'Price varies';

            /* Remove button */
            var removeBtn = document.createElement('button');
            removeBtn.style.cssText = [
              'width: 24px',
              'height: 24px',
              'border-radius: 50%',
              'border: 1px solid var(--brd)',
              'background: transparent',
              'color: var(--txt2)',
              'font-size: 14px',
              'cursor: pointer',
              'display: flex',
              'align-items: center',
              'justify-content: center',
              'flex-shrink: 0',
              'font-family: var(--font)',
              'line-height: 1',
              'padding: 0'
            ].join(';');
            removeBtn.setAttribute('aria-label', 'Remove ' + item.item + ' from list');
            removeBtn.textContent = '\u00D7';

            removeBtn.addEventListener('click', function () {
              plan.groceryList.items = plan.groceryList.items.filter(function (it) {
                return it.item !== item.item;
              });
              savePlan(plan);
              showToast('Removed from your list.');
              updateTotalDisplay();
              renderListArea();
            });

            itemRight.appendChild(itemPrice);
            itemRight.appendChild(removeBtn);

            itemRow.appendChild(itemLeft);
            itemRow.appendChild(itemRight);
            listCard.appendChild(itemRow);
          });

          listArea.appendChild(listCard);

          var spacer = document.createElement('div');
          spacer.style.cssText = 'height: 16px;';
          listArea.appendChild(spacer);
        }

        renderListArea();
      }

      /* ---- RENDER COOK PLAN TAB ---- */
      function renderCookPlan() {
        tabContent.innerHTML = '';

        var noFridge = hasFridge === 'no' || hasFridge === 'No fridge';

        var hintCard = document.createElement('div');
        hintCard.className = 'card-warning';
        hintCard.style.cssText = 'margin: 16px 16px 0; font-size: 14px; color: var(--txt);';
        hintCard.textContent = noFridge
          ? 'Since you do not have a fridge, your chef has planned fresh meals for each day. Cook only what you need each time.'
          : 'Batch cooking saves time and money. Cook soups and stews once and use them across multiple meals.';
        tabContent.appendChild(hintCard);

        (plan.cookPlan || []).forEach(function (entry) {
          var card = document.createElement('div');
          card.className = 'card';
          card.style.cssText = 'margin: 12px 16px 0; padding: 0; overflow: hidden;';

          var cardHeader = document.createElement('div');
          cardHeader.style.cssText = 'background: var(--forest); padding: 10px 14px;';
          var cardDay = document.createElement('p');
          cardDay.style.cssText = 'color: #ffffff; font-weight: 700; font-size: 14px; margin: 0;';
          cardDay.textContent = entry.day;
          cardHeader.appendChild(cardDay);
          card.appendChild(cardHeader);

          var cardBody = document.createElement('div');
          cardBody.style.cssText = 'padding: 12px 14px;';

          function makeDetailRow(label, value, valueStyle) {
            var wrap = document.createElement('div');
            wrap.style.cssText = 'margin-bottom: 8px;';
            var lbl = document.createElement('p');
            lbl.style.cssText = 'font-size: 12px; font-weight: 600; color: var(--txt2); margin: 0 0 2px;';
            lbl.textContent = label;
            var val = document.createElement('p');
            val.style.cssText = valueStyle || 'font-size: 14px; color: var(--txt); margin: 0;';
            val.textContent = value || '';
            wrap.appendChild(lbl);
            wrap.appendChild(val);
            return wrap;
          }

          cardBody.appendChild(makeDetailRow('What to cook:', entry.whatToCook, 'font-size: 14px; color: var(--txt); margin: 0;'));
          cardBody.appendChild(makeDetailRow('Quantity:', entry.quantity, 'font-size: 13px; color: var(--txt2); margin: 0;'));
          if (!noFridge) {
            cardBody.appendChild(makeDetailRow('Storage:', entry.howToStore, 'font-size: 13px; color: var(--txt2); margin: 0;'));
          }
          cardBody.appendChild(makeDetailRow('Covers:', entry.schedule, 'font-size: 13px; color: var(--txt2); margin: 0;'));

          card.appendChild(cardBody);
          tabContent.appendChild(card);
        });

        var spacer = document.createElement('div');
        spacer.className = 'spacer-16';
        tabContent.appendChild(spacer);
      }

      /* ---- RENDER ACTIVE TAB ---- */
      function renderTabContent() {
        if (activeTab === 'calendar') renderCalendar();
        else if (activeTab === 'grocery') renderGrocery();
        else if (activeTab === 'cook') renderCookPlan();
        /* Re-set active styles */
        Object.keys(tabBtns).forEach(function (k) {
          var btn = tabBtns[k];
          if (k === activeTab) {
            btn.style.color = 'var(--forest)';
            btn.style.borderBottom = '2px solid var(--forest)';
          } else {
            btn.style.color = 'var(--txt2)';
            btn.style.borderBottom = '2px solid transparent';
          }
        });
      }

      renderTabContent();

      /* ---- MODIFY MY PLAN BUTTON ---- */
      var modifyBtn = document.createElement('button');
      modifyBtn.className = 'btn btn-secondary';
      modifyBtn.style.cssText = 'margin: 0 16px; width: calc(100% - 32px); position: fixed; bottom: 16px; left: 0; background: var(--card);';
      modifyBtn.textContent = 'Modify my plan';
      modifyBtn.addEventListener('click', function () { showModifySheet(); });

      /* ---- SHOW MODIFY BOTTOM SHEET ---- */
      function showModifySheet() {
        showBottomSheet(function (sheet, closeSheet) {
          var inner = document.createElement('div');
          inner.style.cssText = 'padding: 0 20px 24px;';

          var sheetTitle = document.createElement('p');
          sheetTitle.style.cssText = 'font-size: 16px; font-weight: 700; color: var(--txt); margin: 16px 0 16px;';
          sheetTitle.textContent = 'What would you like to change?';
          inner.appendChild(sheetTitle);

          var modifyOptions = [
            { label: 'I got new ingredients', icon: 'ti-basket', action: 'ingredients' },
            { label: 'My budget changed', icon: 'ti-currency-naira', action: 'budget' },
            { label: 'My cooking situation changed', icon: 'ti-flame', action: 'methods' },
            { label: 'Show me something different', icon: 'ti-refresh', action: 'shuffle' }
          ];

          var subFormArea = document.createElement('div');

          modifyOptions.forEach(function (opt) {
            var row = document.createElement('div');
            row.style.cssText = [
              'display: flex',
              'align-items: center',
              'gap: 12px',
              'padding: 14px 0',
              'border-bottom: 1px solid var(--brd)',
              'cursor: pointer'
            ].join(';');

            var icon = document.createElement('i');
            icon.className = 'ti ' + opt.icon;
            icon.style.cssText = 'font-size: 20px; color: var(--forest); flex-shrink: 0;';

            var lbl = document.createElement('span');
            lbl.style.cssText = 'font-size: 14px; font-weight: 500; color: var(--txt); flex: 1;';
            lbl.textContent = opt.label;

            var chev = document.createElement('i');
            chev.className = 'ti ti-chevron-right';
            chev.style.cssText = 'font-size: 14px; color: var(--txt2);';

            row.appendChild(icon);
            row.appendChild(lbl);
            row.appendChild(chev);

            row.addEventListener('click', function () {
              subFormArea.innerHTML = '';
              handleModifyAction(opt.action, subFormArea, closeSheet);
            });

            inner.appendChild(row);
          });

          inner.appendChild(subFormArea);
          sheet.appendChild(inner);
        });
      }

      function handleModifyAction(action, subFormArea, closeSheet) {
        if (action === 'shuffle') {
          closeSheet();
          var result = generateWeekPlan(
            Object.assign({}, state.profile || {}, constraints),
            [],
            Object.assign({}, constraints, { breakfastPrefs: [], lunchPrefs: [], dinnerPrefs: [] }),
            plan.duration || 5
          );
          state.plan = result;
          savePlan(state.plan);
          showToast('Fresh options, same ingredients. Here\u2019s your new plan.');
          navigate('plan-results');
          return;
        }

        var formWrap = document.createElement('div');
        formWrap.style.cssText = 'margin-top: 16px;';

        if (action === 'ingredients') {
          var ingLabel = document.createElement('p');
          ingLabel.style.cssText = 'font-size: 13px; font-weight: 600; color: var(--txt); margin-bottom: 10px;';
          ingLabel.textContent = 'What did you get?';
          formWrap.appendChild(ingLabel);

          var newPantry = [];
          var activeCat = Object.keys(ING)[0];

          var catScroll = document.createElement('div');
          catScroll.className = 'category-scroll';
          catScroll.style.cssText = 'margin-bottom: 8px;';

          var ingChipsArea = document.createElement('div');
          ingChipsArea.style.cssText = 'display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; max-height: 120px; overflow-y: auto;';

          function renderIngChips(cat) {
            ingChipsArea.innerHTML = '';
            (ING[cat] || []).forEach(function (item) {
              var chip = document.createElement('button');
              chip.className = 'chip-sm';
              if (newPantry.indexOf(item.l) !== -1) chip.classList.add('selected');
              chip.textContent = item.e + ' ' + item.l;
              chip.addEventListener('click', function () {
                var idx = newPantry.indexOf(item.l);
                if (idx !== -1) {
                  newPantry.splice(idx, 1);
                  chip.classList.remove('selected');
                } else {
                  newPantry.push(item.l);
                  chip.classList.add('selected');
                }
              });
              ingChipsArea.appendChild(chip);
            });
          }

          Object.keys(ING).forEach(function (cat) {
            var tab = document.createElement('button');
            tab.className = 'category-tab';
            if (cat === activeCat) { tab.classList.add('active'); tab.setAttribute('aria-selected', 'true'); }
            tab.textContent = cat;
            tab.addEventListener('click', function () {
              activeCat = cat;
              catScroll.querySelectorAll('.category-tab').forEach(function (t) {
                t.classList.remove('active');
                t.setAttribute('aria-selected', 'false');
              });
              tab.classList.add('active');
              tab.setAttribute('aria-selected', 'true');
              renderIngChips(activeCat);
            });
            catScroll.appendChild(tab);
          });

          renderIngChips(activeCat);
          formWrap.appendChild(catScroll);
          formWrap.appendChild(ingChipsArea);

          var confirmBtn = document.createElement('button');
          confirmBtn.className = 'btn btn-primary';
          confirmBtn.style.cssText = 'margin-top: 8px;';
          confirmBtn.textContent = 'Update my plan';
          confirmBtn.addEventListener('click', function () {
            closeSheet();
            var updatedPantry = newPantry;
            var result = generateWeekPlan(
              Object.assign({}, state.profile || {}, constraints),
              updatedPantry,
              constraints,
              plan.duration || 5
            );
            state.plan = result;
            savePlan(state.plan);
            showToast(newPantry.length + ' meals updated based on what you added.');
            navigate('plan-results');
          });
          formWrap.appendChild(confirmBtn);
        }

        if (action === 'budget') {
          var budgLabel = document.createElement('p');
          budgLabel.style.cssText = 'font-size: 13px; font-weight: 600; color: var(--txt); margin-bottom: 10px;';
          budgLabel.textContent = 'What is your new budget?';
          formWrap.appendChild(budgLabel);

          var budgWrap = document.createElement('div');
          budgWrap.className = 'input-prefix-wrap';
          budgWrap.style.cssText = 'margin-bottom: 12px;';
          var budgSymbol = document.createElement('span');
          budgSymbol.className = 'input-prefix-symbol';
          budgSymbol.textContent = '\u20A6';
          var budgInput = document.createElement('input');
          budgInput.type = 'number';
          budgInput.className = 'input';
          budgInput.placeholder = '0';
          budgInput.min = '0';
          budgWrap.appendChild(budgSymbol);
          budgWrap.appendChild(budgInput);
          formWrap.appendChild(budgWrap);

          var confirmBudgBtn = document.createElement('button');
          confirmBudgBtn.className = 'btn btn-primary';
          confirmBudgBtn.textContent = 'Update my plan';
          confirmBudgBtn.addEventListener('click', function () {
            closeSheet();
            var newBudget = budgInput.value;
            if (state.profile) { state.profile.budget = newBudget; saveProfile(state.profile); }
            var updatedConstraints = Object.assign({}, constraints, { budget: newBudget });
            var result = generateWeekPlan(
              Object.assign({}, state.profile || {}, updatedConstraints),
              [],
              updatedConstraints,
              plan.duration || 5
            );
            state.plan = result;
            savePlan(state.plan);
            showToast('A few swaps made to fit your new budget.');
            navigate('plan-results');
          });
          formWrap.appendChild(confirmBudgBtn);
        }

        if (action === 'methods') {
          var methLabel = document.createElement('p');
          methLabel.style.cssText = 'font-size: 13px; font-weight: 600; color: var(--txt); margin-bottom: 10px;';
          methLabel.textContent = 'How are you cooking now?';
          formWrap.appendChild(methLabel);

          var methodOptions = ['Boiling', 'Frying', 'Stewing', 'Steaming', 'Roasting', 'Grilling', 'Baking'];
          var selectedMethods = (constraints.methods || []).slice();

          var methChips = document.createElement('div');
          methChips.style.cssText = 'display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px;';
          methodOptions.forEach(function (m) {
            var chip = document.createElement('button');
            chip.className = 'chip-sm';
            if (selectedMethods.indexOf(m) !== -1) chip.classList.add('selected');
            chip.textContent = m;
            chip.addEventListener('click', function () {
              var idx = selectedMethods.indexOf(m);
              if (idx !== -1) { selectedMethods.splice(idx, 1); chip.classList.remove('selected'); }
              else { selectedMethods.push(m); chip.classList.add('selected'); }
            });
            methChips.appendChild(chip);
          });
          formWrap.appendChild(methChips);

          var confirmMethBtn = document.createElement('button');
          confirmMethBtn.className = 'btn btn-primary';
          confirmMethBtn.textContent = 'Update my plan';
          confirmMethBtn.addEventListener('click', function () {
            closeSheet();
            if (state.profile) { state.profile.methods = selectedMethods.slice(); saveProfile(state.profile); }
            var updatedConstraints = Object.assign({}, constraints, { methods: selectedMethods });
            var result = generateWeekPlan(
              Object.assign({}, state.profile || {}, updatedConstraints),
              [],
              updatedConstraints,
              plan.duration || 5
            );
            state.plan = result;
            savePlan(state.plan);
            showToast(selectedMethods.length + ' meals adjusted to your new cooking setup.');
            navigate('plan-results');
          });
          formWrap.appendChild(confirmMethBtn);
        }

        subFormArea.appendChild(formWrap);
      }

      app.innerHTML = '';
      app.appendChild(screen);
      app.appendChild(modifyBtn);
    });

    /* ===========================================
       APP INITIALIZER
    =========================================== */
    function init() {
      state.profile = loadProfile();
      state.saved = loadSaved();
      state.plan = loadPlan();
      if (state.profile && state.profile.name) {
        navigate('home');
      } else {
        navigate('welcome');
      }
    }

    document.addEventListener('DOMContentLoaded', init);

  </script>
</body>
</html>
